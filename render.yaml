services:
  - type: web
    name: todo-adventure
    env: python
    buildCommand: |
      pip install -r backend/requirements.txt
      pip install gunicorn
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT backend.app:app
    envVars:
      - key: STATIC_DIR
        value: ./backend/frontend_dist
      - key: TODO_DB_PATH
        value: ./backend/todos.db
      - key: TODO_PHOTOS_PATH
        value: ./backend/photos
    plan: starter
